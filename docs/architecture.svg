<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">AI Product Manager Architecture</title>
  <desc id="desc">Simplified architecture diagram: Frontend (Next.js/Vite), Backend Services (APIs/Auth/Analytics), AI Layer (LLM & task generation), Data & Infrastructure (DB, Cloud), and Third-Party Integrations.</desc>
  <defs>
    <style>
      .bg { fill: #030617 }
      .box { fill: #071428; stroke: #0f2a44; stroke-width: 2 }
      .title { font: 700 20px Inter, Helvetica, Arial, sans-serif; fill: #9EE7FF }
      .label { font: 600 13px Inter, Helvetica, Arial, sans-serif; fill: #C7F2E6 }
      .muted { font: 400 12px Inter, Helvetica, Arial, sans-serif; fill: #93A6B8 }
      .connector { stroke: #2DD4BF; stroke-width: 3; fill: none; marker-end: url(#arrow) }
      .accent { stroke: #8B5CF6 }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2DD4BF" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1400" height="700" class="bg"/>

  <text x="36" y="36" class="title">AI Product Manager</text>

  <!-- Frontend -->
  <g transform="translate(28,64)">
    <rect x="0" y="0" width="220" height="150" rx="10" class="box" />
    <text x="16" y="28" class="label">Frontend</text>
    <text x="16" y="52" class="muted">Dashboard UI (React • Next.js / Vite)</text>
  </g>

  <!-- Backend Services -->
  <g transform="translate(280,28)">
    <rect x="0" y="0" width="300" height="200" rx="12" class="box" />
    <text x="16" y="28" class="label">Backend Services</text>
    <text x="16" y="52" class="muted">Backend APIs • Auth & Gateway • Analytics</text>
  </g>

  <!-- AI Layer -->
  <g transform="translate(616,28)">
    <rect x="0" y="0" width="300" height="200" rx="12" class="box" />
    <text x="16" y="28" class="label">AI Intelligence Layer</text>
    <text x="16" y="52" class="muted">LLM • Task Generator • Sprint Planner</text>
  </g>

  <!-- Data & Infrastructure -->
  <g transform="translate(280,260)">
    <rect x="0" y="0" width="300" height="120" rx="10" class="box" />
    <text x="16" y="28" class="label">Data & Infrastructure</text>
    <text x="16" y="52" class="muted">Postgres • Vector DB • Cloud Deployment</text>
  </g>

  <!-- Third-party -->
  <g transform="translate(616,260)">
    <rect x="0" y="0" width="300" height="120" rx="10" class="box" />
    <text x="16" y="28" class="label">Third-Party Integrations</text>
    <text x="16" y="52" class="muted">Jira • Slack • GitHub</text>
  </g>

  <!-- Connectors -->
  <path d="M 248 140 L 280 140" class="connector" />
  <path d="M 580 140 L 616 140" class="connector accent" />
  <path d="M 430 248 L 430 260" class="connector" />
  <path d="M 580 320 L 616 320" class="connector" />

  <text x="36" y="680" class="muted">User-facing frontend connects to backend services; AI layer provides LLM-powered generation; data lives in Postgres/Vector DB; third-party integrations for workflows.</text>
</svg>
