services:
  - type: web
    name: ai-product-manager
    runtime: node
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: NODE_OPTIONS=--max-old-space-size=3072 npm ci && NODE_OPTIONS=--max-old-space-size=3072 npm run build
    startCommand: node dist/server.cjs
    healthCheckPath: /api/health
